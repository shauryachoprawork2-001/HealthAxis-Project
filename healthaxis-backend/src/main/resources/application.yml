spring:
  application:
    name: healthaxis-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  address: 0.0.0.0

  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:healthaxis-super-secret-key-that-is-long-enough-for-hs512-algorithm-production}

  access-token-expiration: ${JWT_ACCESS_EXPIRY:900000}

  refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800000}

logging:
  level:
    com.healthaxis: DEBUG