spring:
  application:
    name: healthaxis-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    show-sql: false

    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

        jdbc:
          batch_size: 20

        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

    time-zone: UTC

server:
  port: ${PORT:8080}

  servlet:
    context-path: /api

  compression:
    enabled: true

    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:healthaxis-super-secret-key-that-is-long-enough-for-hs512-algorithm-production}

  access-token-expiration: ${JWT_ACCESS_EXPIRY:900000}

  refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800000}

# Stripe
stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}

  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# Application Config
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  pagination:
    default-page-size: 20
    max-page-size: 100

  cache:
    ttl:
      hospital: 3600
      doctor: 1800
      occupancy: 60

# Logging
logging:
  level:
    com.healthaxis: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      show-details: when-authorized

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
